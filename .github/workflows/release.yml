name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing tag to release (e.g. v0.2.0)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  tag:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    outputs:
      new_tag: ${{ steps.tag.outputs.new_tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Bump version and push tag
        id: tag
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          default_bump: patch
          release_branches: main
          tag_prefix: v
          # Pre-1.0 policy: breaking changes bump minor instead of major.
          # Remove this line once the project reaches v1.0.0 so that `!:` /
          # `BREAKING CHANGE:` commits correctly bump major.
          custom_release_rules: breaking:minor,feat!:minor,feat:minor,fix:patch

  release:
    needs: tag
    if: |
      always() &&
      (
        github.event_name == 'workflow_dispatch' ||
        (needs.tag.result == 'success' && needs.tag.outputs.new_tag != '')
      )
    runs-on: ubuntu-latest
    steps:
      - name: Resolve release ref
        id: ref
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "ref=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "ref=${{ needs.tag.outputs.new_tag }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ steps.ref.outputs.ref }}

      - name: Verify dispatched tag exists
        if: github.event_name == 'workflow_dispatch'
        run: git rev-parse "refs/tags/${{ inputs.tag }}"

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: stable

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
